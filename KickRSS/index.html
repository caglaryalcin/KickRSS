<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>KickRSS</title>
	</head>
	<body style="font-family: system-ui, sans-serif; line-height: 1.5; margin: 2rem;">
		<h1>KickRSS</h1>
		<p>Subscribe to Kick channels as RSS feeds.</p>
		<ul>
			<li><code>/vod/&lt;channel&gt;</code> includes live stream and videos.</li>
			<li><code>/vodonly/&lt;channel&gt;</code> includes videos only.</li>
		</ul>
		<p>Example: <a href="/vod/xqc">/vod/xqc</a></p>
	</body>
</html>
